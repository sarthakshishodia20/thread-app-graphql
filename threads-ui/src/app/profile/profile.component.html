<div class="profile-container fade-in">

  <!-- Loading -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
    <p>Profile load ho raha hai...</p>
  </div>

  <!-- Error -->
  <div class="error-state" *ngIf="errorMsg && !loading">
    <p>⚠️ {{ errorMsg }}</p>
  </div>

  <!-- Profile Card -->
  <div class="profile-card" *ngIf="!loading && user" id="profile-card">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar" *ngIf="!user.profileImageUrl">
        {{ getInitials(user.firstName, user.lastName) }}
      </div>
      <img *ngIf="user.profileImageUrl" [src]="user.profileImageUrl" class="avatar-img" alt="Profile" />
    </div>

    <!-- Name -->
    <div class="profile-name" id="profile-name">
      {{ user.firstName }} {{ user.lastName }}
    </div>
    <div class="profile-email" id="profile-email">{{ user.email }}</div>

    <!-- Details -->
    <div class="profile-details">
      <div class="detail-row">
        <span class="detail-label">User ID</span>
        <span class="detail-value" id="profile-id">{{ user.id }}</span>
      </div>
      <div class="detail-row" *ngIf="user.email">
        <span class="detail-label">Email</span>
        <span class="detail-value">{{ user.email }}</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <a routerLink="/create" class="action-btn primary-btn">+ Create Post</a>
      <a routerLink="/feed" class="action-btn secondary-btn">View Feed</a>
    </div>
  </div>
</div>
