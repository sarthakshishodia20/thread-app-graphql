<div class="auth-container fade-in">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">🧵</div>
      <h1>Threads</h1>
      <p class="brand-sub">Create your account</p>
    </div>

    <div class="name-row">
      <div class="form-group">
        <label>First Name *</label>
        <input id="reg-firstname" class="form-input" type="text" placeholder="Sarthak" [(ngModel)]="firstName" />
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input id="reg-lastname" class="form-input" type="text" placeholder="Sharma" [(ngModel)]="lastName" />
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input id="reg-email" class="form-input" type="email" placeholder="you@example.com" [(ngModel)]="email" />
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input id="reg-password" class="form-input" type="password" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="registerUser()" />
    </div>

    <div *ngIf="errorMsg" class="error-msg">⚠️ {{ errorMsg }}</div>
    <div *ngIf="successMsg" class="success-msg">✅ {{ successMsg }}</div>

    <button id="register-btn" class="btn-primary" (click)="registerUser()" [disabled]="loading">
      <span *ngIf="!loading">Create Account</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <p class="redirect-text">
      Already account hai? <a routerLink="/login">Login karo</a>
    </p>
  </div>
</div>
